services:
  - type: web
    name: appel-backend
    env: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: ANDROID_PACKAGE_NAME
        value: hr.appel.elevators
      - key: PLAY_STORE_URL
        value: https://play.google.com/store/apps/details?id=hr.appel.elevators
      $12.0.13
      $117
      $12.0.13
      $117

  - type: web
    name: appel-backend-staging
    env: node
    region: frankfurt
    plan: free
    branch: develop
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: ANDROID_PACKAGE_NAME
        value: hr.appel.elevators.staging
      - key: PLAY_STORE_URL
        value: https://play.google.com/store/apps/details?id=hr.appel.elevators
      $12.0.13
      $117
      $12.0.13
      $117
